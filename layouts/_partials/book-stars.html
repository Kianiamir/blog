{{- $rating := float (.rating | default 0) -}}
{{- $max := float (.max | default 5) -}}
<span class="book-stars" aria-label="{{ printf "%.1f of %.0f stars" $rating $max }}">
  {{- range seq (int $max) -}}
    {{- $i := float . -}}
    {{- if ge $rating $i -}}
    <span class="book-star book-star-full" aria-hidden="true">★</span>
    {{- else if ge (sub $rating (sub $i 1)) 0.5 -}}
    <span class="book-star book-star-half" aria-hidden="true">★</span>
    {{- else -}}
    <span class="book-star book-star-empty" aria-hidden="true">★</span>
    {{- end -}}
  {{- end -}}
</span>
