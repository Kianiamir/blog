{{ $.Scratch.Set "md" false }}

{{ if .IsNamedParams }}
  {{ $.Scratch.Set "md" (.Get "md") }}
{{ else }}
  {{ $.Scratch.Set "md" (.Get 0) }}
{{ end }}

<div class="ltr-block" dir="ltr">
  {{ if eq ($.Scratch.Get "md") false }}
    {{ .Inner | safeHTML }}
  {{ else }}
    {{ .Inner | markdownify }}
  {{ end }}
</div>
